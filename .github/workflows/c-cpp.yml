name: Compila Crash Windows Real

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Installa il Compilatore per Windows
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 libsdl2-dev make

    - name: Compilazione per Windows (64-bit)
      run: |
        make CC=x86_64-w64-mingw32-gcc

    - name: Salva l'eseguibile Windows
      uses: actions/upload-artifact@v4
      with:
        name: crash-windows-bin
        path: |
          c1.exe
